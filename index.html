<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Kelime Anlamı</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg,#f8f6f3 0%,#f0ece6 50%,#e8e4dd 100%);
  padding:2rem 1rem;
  -webkit-font-smoothing:antialiased;
}

@keyframes rise{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.card{
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  max-width:420px;
  width:100%;
  border-radius:24px;
  padding:3.5rem 2.5rem;
  border:1px solid rgba(255,255,255,.6);
  box-shadow:0 4px 24px rgba(0,0,0,.04),0 16px 56px rgba(0,0,0,.06);
  text-align:center;
  animation:rise .6s ease both;
}

.word{
  font-family:"DM Serif Display",serif;
  font-size:2.8rem;
  color:#1a1a1a;
  margin-bottom:1rem;
  line-height:1.1;
  word-break:break-word;
}

.line{
  width:40px;
  height:2px;
  background:linear-gradient(90deg,#c8b898,#a89878);
  margin:0 auto 1.4rem;
  border-radius:2px;
  opacity:.6;
}

.meaning{
  font-family:Inter,sans-serif;
  font-size:1.05rem;
  font-weight:300;
  color:#5a5550;
  line-height:1.8;
  margin-bottom:2.5rem;
  letter-spacing:.01em;
}

.err{
  color:#c44;
  font-size:1rem;
  padding:2rem;
}

@media(max-width:480px){
  .card{padding:2.5rem 1.5rem;border-radius:20px}
  .word{font-size:2rem}
}
</style>
</head>

<body>

<div class="card" id="c">
  <div class="word" id="w"></div>
  <div class="line"></div>
  <div class="meaning" id="m"></div>
</div>

<script>
let sonOkunanVeri = "";

function kartiYaz(kelime, anlam){
  document.getElementById("c").innerHTML = `
    <div class="word" id="w"></div>
    <div class="line"></div>
    <div class="meaning" id="m"></div>
  `;

  document.getElementById("w").textContent = kelime || "";
  document.getElementById("m").textContent = anlam || "";
  document.title = kelime ? kelime + " - Anlamı" : "Kelime Anlamı";
}

function hataYaz(mesaj){
  document.getElementById("c").innerHTML =
    '<p class="err">' + mesaj + '</p>';
}

function oku(){
  try{
    if(location.hash && location.hash.indexOf("#v=") === 0){
      const raw = decodeURIComponent(location.hash.substring(3));

      if(raw === sonOkunanVeri){
        return;
      }

      sonOkunanVeri = raw;

      const d = JSON.parse(raw);

      kartiYaz(d.k, d.a);

      /*
        KRİTİK ÇÖZÜM:
        QR okunduktan sonra URL'deki #v= kısmını temizliyoruz.
        Böylece başka QR okutulunca tarayıcı aynı sayfada takılı kalmıyor.
      */
      setTimeout(function(){
        history.replaceState(
          null,
          document.title,
          location.pathname + location.search
        );
      }, 300);

    } else {
      // Sayfa boş açıldıysa eski kartı bozma
      if(!sonOkunanVeri){
        hataYaz("QR kodu yanlış okundu veya veri bulunamadı.");
      }
    }
  } catch(e){
    hataYaz("Veri okunamadı.");
  }
}

// İlk açılışta çalışır
oku();

// Hash değişirse tekrar oku
window.addEventListener("hashchange", oku);

// Mobilde sekmeye geri dönünce tekrar kontrol et
window.addEventListener("pageshow", oku);
window.addEventListener("focus", oku);

document.addEventListener("visibilitychange", function(){
  if(!document.hidden){
    oku();
  }
});

// Bazı telefonlarda event çalışmazsa diye yedek kontrol
setInterval(oku, 500);
</script>

</body>
</html>
