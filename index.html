<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kelime Duvarı</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafafa;padding:2rem 1rem;-webkit-font-smoothing:antialiased}.card{background:#fff;max-width:400px;width:100%;border-radius:20px;padding:3.5rem 2.5rem;border:1px solid #ebebeb;box-shadow:0 12px 40px rgba(0,0,0,.08);text-align:center}.label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.35em;color:#a0a0a0;margin-bottom:2rem}.word{font-family:"DM Serif Display",serif;font-size:2.6rem;color:#1a1a1a;margin-bottom:1.2rem;line-height:1.15;word-break:break-word}.divider{width:32px;height:1.5px;background:#1a1a1a;margin:0 auto 1.2rem;opacity:.2}.meaning{font-family:Inter,sans-serif;font-size:1rem;font-weight:300;color:#6e6e6e;line-height:1.75;margin-bottom:2rem}.foot{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#a0a0a0;opacity:.4}.err{color:#d94040;font-size:1rem;padding:2rem}@media(max-width:480px){.card{padding:2.5rem 1.5rem}.word{font-size:2rem}}</style></head><body><div class="card" id="c"><div class="label">Kelime Duvarı</div><div class="word" id="w"></div><div class="divider"></div><div class="meaning" id="m"></div><div class="foot">Kelime Duvarı Projesi</div></div><script>try{if(location.hash&&location.hash.indexOf("#v=")===0){var d=JSON.parse(decodeURIComponent(location.hash.substring(3)));document.getElementById("w").textContent=d.k;document.getElementById("m").textContent=d.a;document.title=d.k+" — Kelime Duvarı"}else{document.getElementById("c").innerHTML='<p class="err">QR kodu yanlış okundu veya veri bulunamadı.</p>'}}catch(e){document.getElementById("c").innerHTML='<p class="err">Veri okunamadı.</p>'}</script></body></html>
