<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kelime Duvarı</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#f8f6f3 0%,#f0ece6 50%,#e8e4dd 100%);padding:2rem 1rem;-webkit-font-smoothing:antialiased}@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.card{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);max-width:420px;width:100%;border-radius:24px;padding:3.5rem 2.5rem;border:1px solid rgba(255,255,255,.6);box-shadow:0 4px 24px rgba(0,0,0,.04),0 16px 56px rgba(0,0,0,.06);text-align:center;animation:rise .6s ease both}.label{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.4em;color:#b0a898;margin-bottom:2rem}.word{font-family:"DM Serif Display",serif;font-size:2.8rem;color:#1a1a1a;margin-bottom:1rem;line-height:1.1;word-break:break-word}.line{width:40px;height:2px;background:linear-gradient(90deg,#c8b898,#a89878);margin:0 auto 1.4rem;border-radius:2px;opacity:.6}.meaning{font-family:Inter,sans-serif;font-size:1.05rem;font-weight:300;color:#5a5550;line-height:1.8;margin-bottom:2.5rem;letter-spacing:.01em}.foot{font-size:.55rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:#c0b8a8}.err{color:#c44;font-size:1rem;padding:2rem}@media(max-width:480px){.card{padding:2.5rem 1.5rem;border-radius:20px}.word{font-size:2rem}}</style></head><body><div class="card" id="c"><div class="label">Kelime Duvarı</div><div class="word" id="w"></div><div class="line"></div><div class="meaning" id="m"></div><div class="foot">Kelime Duvarı Projesi</div></div><script>try{if(location.hash&&location.hash.indexOf("#v=")===0){var d=JSON.parse(decodeURIComponent(location.hash.substring(3)));document.getElementById("w").textContent=d.k;document.getElementById("m").textContent=d.a;document.title=d.k+" — Kelime Duvarı"}else{document.getElementById("c").innerHTML='<p class="err">QR kodu yanlış okundu veya veri bulunamadı.</p>'}}catch(e){document.getElementById("c").innerHTML='<p class="err">Veri okunamadı.</p>'}</script></body></html>
