<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kelime Duvari</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@1,400&family=Inter:wght@300;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#f5f0eb,#ece5dc 50%,#e8ddd0);padding:2rem 1rem}.card{background:#fffdf9;max-width:420px;width:100%;border-radius:20px;padding:3rem 2.5rem;box-shadow:0 8px 40px rgba(44,37,32,.12),0 2px 8px rgba(44,37,32,.06);text-align:center;position:relative;overflow:hidden}.card::before,.card::after{content:"";position:absolute;width:50px;height:50px;border:2px solid #f0e6d0;opacity:.5}.card::before{top:20px;left:20px;border-right:none;border-bottom:none;border-top-left-radius:8px}.card::after{bottom:20px;right:20px;border-left:none;border-top:none;border-bottom-right-radius:8px}.label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.3em;color:#b8860b;margin-bottom:1.5rem}.word{font-family:"Playfair Display",serif;font-size:2.4rem;font-weight:900;color:#2c2520;margin-bottom:1rem;line-height:1.15;word-break:break-word}.divider{width:50px;height:2px;background:#b8860b;margin:0 auto 1.2rem;border-radius:2px}.meaning{font-family:"Crimson Pro",serif;font-size:1.15rem;font-style:italic;color:#6b5e53;line-height:1.65;margin-bottom:1.5rem}.foot{font-size:.7rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#b8860b;opacity:.5}.err{color:#c0392b;font-size:1rem;padding:2rem}@media(max-width:480px){.card{padding:2rem 1.5rem}.word{font-size:1.8rem}}</style></head><body><div class="card" id="c"><div class="label">Kelime Duvari</div><div class="word" id="w"></div><div class="divider"></div><div class="meaning" id="m"></div><div class="foot">Kelime Duvari Projesi</div></div><script>try{if(location.hash&&location.hash.indexOf("#v=")===0){var d=JSON.parse(decodeURIComponent(location.hash.substring(3)));document.getElementById("w").textContent=d.k;document.getElementById("m").textContent=d.a;document.title=d.k+" - Kelime Duvari"}else{document.getElementById("c").innerHTML='<p class="err">QR kodu yanlis okundu veya veri bulunamadi.</p>'}}catch(e){document.getElementById("c").innerHTML='<p class="err">Veri okunamadi.</p>'}</script></body></html>
